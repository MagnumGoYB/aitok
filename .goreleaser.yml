version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: aitok
    main: ./cmd/aitok
    binary: aitok
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: aitok
    repository:
      owner: MagnumGoYB
      name: homebrew-aitok
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/MagnumGoYB/aitok"
    description: "Offline CLI for summarizing local AI coding token usage"
    license: MIT
    binaries:
      - aitok
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/aitok"]
          end
