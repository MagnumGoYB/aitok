version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: aitok-darwin
    main: ./cmd/aitok
    binary: aitok
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
  - id: aitok-linux
    main: ./cmd/aitok
    binary: aitok
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
  - id: aitok-windows
    main: ./cmd/aitok
    binary: aitok
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: darwin
    ids: [aitok-darwin]
    formats: [tar.gz]
  - id: linux
    ids: [aitok-linux]
    formats: [tar.gz]
  - id: windows
    ids: [aitok-windows]
    formats: [zip]

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: aitok
    ids: [darwin]
    repository:
      owner: MagnumGoYB
      name: homebrew-aitok
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/MagnumGoYB/aitok"
    description: "Offline CLI for summarizing local AI coding token usage"
    license: MIT
    binaries:
      - aitok
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/aitok"]
          end
