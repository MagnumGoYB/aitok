name: Build

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true
      - run: go run ./tools/version
      - run: mkdir -p dist
      - run: go build -trimpath -ldflags "-s -w" -o dist/aitok-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/aitok
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
      - uses: actions/upload-artifact@v7
        with:
          name: aitok-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/aitok-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error
